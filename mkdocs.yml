site_name: PowerStore Exporter
site_description: Prometheus + OTLP exporter for Dell PowerStore arrays
site_url: https://fjacquet.github.io/pstore_exporter/
repo_url: https://github.com/fjacquet/pstore_exporter
repo_name: fjacquet/pstore_exporter

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick Start: getting-started/quickstart.md
  - Metrics Reference: metrics.md
  - Collection Paths: collection-paths.md
  - Alerting: alerting.md
  - Deployment:
      - Docker: deployment/docker.md
      - systemd: deployment/systemd.md
      - Kubernetes: deployment/kubernetes.md
  - Dashboards: dashboards.md
  - OpenTelemetry: opentelemetry.md
  - CI/CD & SBOM: cicd.md
