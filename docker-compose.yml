services:
  pstore_exporter:
    build: .
    image: pstore_exporter
    # Build-only image (no registry). Without this, `docker compose pull`/`up`
    # tries to pull `pstore_exporter` from Docker Hub and fails with access-denied.
    pull_policy: build
    container_name: pstore_exporter
    ports:
      - "9101:9101"
    volumes:
      - ./config.yaml:/etc/pstore_exporter/config.yaml:ro
      # Persist the log file (config.yaml -> logName). Owned by uid 10001 via the image.
      - pstore_logs:/var/log/pstore_exporter
    environment:
      # Provide array secrets via the environment (referenced as ${PSTORE1_PASSWORD}).
      - PSTORE1_PASSWORD=${PSTORE1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pstore_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pstore_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pstore_grafana
    ports:
      - "3000:3000"
    environment:
      # Test-stack credentials (admin / admin). Change for anything non-local.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Datasource + dashboard providers (auto-provisioned on startup).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Bundled dashboards; block/ and file/ become Grafana folders.
      - ./grafana/block:/var/lib/grafana/dashboards/block:ro
      - ./grafana/file:/var/lib/grafana/dashboards/file:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # Optional: receives the OTLP metric push when opentelemetry.metrics is enabled.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pstore_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "8889:8889" # collector-exposed Prometheus metrics

volumes:
  pstore_logs:
