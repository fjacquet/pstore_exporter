replicaCount: 1

image:
  repository: ghcr.io/fjacquet/pstore_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9446

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
# - name: config-templated
#   emptyDir:
#     sizeLimit: 16Mi
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - mountPath: /app/config
#   name: config-templated
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret as config.yaml and mounted at
# /etc/pstore_exporter/config.yaml (the path the container CMD expects via --config).
# This is a free-form passthrough — replace placeholder credentials before deploying.
config: |
  server:
    host: "0.0.0.0"
    port: "9446"
    uri: "/metrics"
    logName: ""

  collection:
    interval: "30s"
    timeout: "20s"

  opentelemetry:
    metrics:
      enabled: false
      endpoint: "localhost:4317"
      insecure: true
      interval: "30s"
    tracing:
      enabled: false
      endpoint: "localhost:4317"
      insecure: true
      samplingRate: 0.1

  arrays:
    - name: pstore-1
      endpoint: "https://PSTORE_HOSTNAME/api/rest"
      username: "USERNAME"
      password: "PASSWORD"
      insecureSkipVerify: true

env: []
# - name: PSTORE1_HOSTNAME
#   value: my-powerstore.example.com
# - name: PSTORE1_PASSWORD
#   valueFrom:
#     secretKeyRef:
#        name: my-external-pstore-secret
#        key: pstore-password

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "false"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9446"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
