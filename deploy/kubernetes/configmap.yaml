apiVersion: v1
kind: ConfigMap
metadata:
  name: pstore-exporter-config
  labels:
    app.kubernetes.io/name: pstore-exporter
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: "9446"
      uri: "/metrics"
      logName: "" # empty -> stdout, captured by the pod logs
    collection:
      interval: "30s"
      timeout: "20s"
    opentelemetry:
      metrics:
        enabled: false
        endpoint: "otel-collector:4317"
        insecure: true
        interval: "30s"
      tracing:
        enabled: false
        endpoint: "otel-collector:4317"
        insecure: true
        samplingRate: 0.1
    arrays:
      - name: pstore-1
        endpoint: <powerstore-api-endpoint>
        username: <monitor-user>
        password: "${PSTORE1_PASSWORD}"
        insecureSkipVerify: true
