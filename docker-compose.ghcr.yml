# Pull-based stack: runs the published GHCR image instead of building locally.
#
#   PSTORE1_PASSWORD='your-monitor-password' docker compose -f docker-compose.ghcr.yml up -d
#
# Pin a version with PSTORE_TAG (defaults to :latest):
#   PSTORE_TAG=0.2.1 PSTORE1_PASSWORD='...' docker compose -f docker-compose.ghcr.yml up -d
#
# Refresh images later with:  docker compose -f docker-compose.ghcr.yml pull
services:
  pstore_exporter:
    image: ghcr.io/fjacquet/pstore_exporter:${PSTORE_TAG:-latest}
    container_name: pstore_exporter
    ports:
      - "9446:9446"
    volumes:
      - ./config.yaml:/etc/pstore_exporter/config.yaml:ro
      # Persist the log file (config.yaml -> logName). Owned by uid 10001 via the image.
      - pstore_logs:/var/log/pstore_exporter
    environment:
      # Provide array connection details via the environment (referenced in config.yaml).
      - PSTORE1_HOSTNAME=${PSTORE1_HOSTNAME:-10.0.0.1}
      - PSTORE1_USERNAME=${PSTORE1_USERNAME:-admin}
      - PSTORE1_PASSWORD=${PSTORE1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pstore_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pstore_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pstore_grafana
    ports:
      - "3000:3000"
    environment:
      # Test-stack credentials (admin / admin). Change for anything non-local.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Datasource + dashboard providers (auto-provisioned on startup).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Bundled dashboards; each subdirectory becomes a Grafana folder
      # (overview/ block/ file/ protection/ hardware/).
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # Optional: receives the OTLP metric push when opentelemetry.metrics is enabled.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pstore_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "8889:8889" # collector-exposed Prometheus metrics

volumes:
  pstore_logs:
